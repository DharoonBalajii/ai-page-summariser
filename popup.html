<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>AI Page Summariser</title>
    <link rel="stylesheet" href="popup.css" />
</head>

<body>
    <div class="container">

        <!-- Header -->
        <div class="header">
            <span class="logo">✨</span>
            <h1>AI Summariser</h1>
        </div>

        <!-- API Key Setup -->
        <div class="api-section" id="apiSection">
            <p class="section-label">Step 1 — Connect Gemini AI</p>

            <a id="studioLink" href="#" class="studio-btn">
                🔑 Get API Key from Google AI Studio
            </a>

            <div class="input-row">
                <input type="password" id="apiKeyInput" placeholder="Paste your API key here..." />
                <button id="saveBtn">Save</button>
            </div>

            <p id="statusMsg" class="status"></p>
        </div>

        <!-- Options Section -->
        <div class="options-section">
            <select id="summaryStyle" class="style-select">
                <option value="bullet_points">Style: Bullet Points</option>
                <option value="tldr">Style: Gist</option>
                <option value="eli5">Style: Explain Like I'm 5</option>
                <option value="executive">Style: Executive Summary</option>
                <option value="action_items">Style: Action Items</option>
            </select>
        </div>

        <!-- Summarise Button -->
        <div class="summarise-section">
            <button id="summariseBtn" class="summarise-btn" disabled>
                ⚡ Summarise This Page
            </button>
        </div>
        
        <!-- Time Saved Banner -->
        <div id="timeSavedBanner" class="time-saved-banner" style="display:none;"></div>

        <!-- Output Box -->
        <div id="output" class="output" style="display:none;">
            <div id="summaryText"></div>
            
            <!-- Chat Section -->
            <div class="chat-section">
                <div id="chatHistory" class="chat-history"></div>
                <div class="input-row" style="margin-top: 12px;">
                    <input type="text" id="chatInput" placeholder="Ask about this page..." />
                    <button id="chatBtn">Ask</button>
                </div>
            </div>

            <div class="action-buttons">
                <button id="copyBtn" class="action-btn" title="Copy to Clipboard">📋 Copy</button>
                <button id="downloadBtn" class="action-btn" title="Download Text">💾 Save</button>
                <button id="readAloudBtn" class="action-btn" title="Listen">🔊 Listen</button>
            </div>
        </div>

    </div>
    <script src="popup.js"></script>
</body>

</html>
